<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Calculator app</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="theme1">
    
    <main>
      <div class="calculator">
        <div class="first">
          <h3>calc</h3>

          <div class="themes">
            <span class="themeText">THEME</span>

            <div class="toggle">
              <div class="toggleNums">
                <span>1</span>
                <span>2</span>
                <span>3</span>
              </div>
              <div class="toggleTrack">
                <span class="toggleHandle"></span>
              </div>
            </div>
          </div>
        </div>

        <div class="output">
          <h1 id="output">0</h1>
        </div>

        <div class="input">
          <div class="buttons">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>DEL</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>+</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>-</button>
            <button>.</button>
            <button>0</button>
            <button>/</button>
            <button>x</button>
          </div>

          <div class="twoButt">
            <button>RESET</button>
            <button>=</button>
          </div>
        </div>
      </div>
    </main>

    <script src="./main.js"></script>
  </body>


</html>
